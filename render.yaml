services:
  - type: web
    name: pdf-parser
    runtime: docker
    rootDir: pdf-parser
    dockerfilePath: ./Dockerfile
    plan: free
    region: virginia

  - type: web
    name: backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: virginia
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Public onrender.com URL (not internal host): a spun-down free-tier
      # service only wakes on requests through Render's public edge router.
      # Internal-network requests to a sleeping instance are refused, so the
      # parser would never wake. Revert to fromService/host on a paid plan.
      - key: PDF_PARSER_URL
        value: https://pdf-parser-zx6t.onrender.com
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d

  # Static web build of the Expo app (client-only SPA, react-router-dom).
  # `expo export --platform web` emits a static bundle to cuentas/dist.
  - type: web
    name: cuentas-web
    runtime: static
    rootDir: cuentas
    buildCommand: npm ci && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      # Baked into the bundle at build time — must point at the public backend
      # URL (https://<backend>.onrender.com), never a LAN IP or localhost.
      # Set in the Render dashboard; a rebuild is required to change it.
      - key: EXPO_PUBLIC_API_URL
        sync: false
    routes:
      # SPA fallback: deep links (/import, /transactions/...) must serve
      # index.html so client-side routing can resolve them.
      - type: rewrite
        source: /*
        destination: /index.html
